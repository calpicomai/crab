name: Simulate smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sim-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: bash .cursor/setup-cloud.sh

      - name: Run simulate smoke test
        run: bash test_sim.sh
